name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: hshinosa
  FRONTEND_IMAGE: hshinosa/codebase-wiki-frontend
  BACKEND_IMAGE: hshinosa/codebase-wiki-backend

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [web, api]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --workspace=apps/${{ matrix.service }}

      - name: Run type check
        run: npm run typecheck --workspace=apps/api
        if: matrix.service == 'api'

      - name: Run tests
        run: npm run test --workspace=apps/${{ matrix.service }}

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [frontend, backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ matrix.service == 'frontend' && env.FRONTEND_IMAGE || env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}

  update-k8s-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout K8s config repository
        uses: actions/checkout@v4
        with:
          repository: devopsTubes-codebase/codebase-wiki-k8s
          token: ${{ secrets.GH_PAT }}
          path: k8s-repo

      - name: Update image tags
        run: |
          cd k8s-repo
          
          # Update frontend image tag
          sed -i "s|image: ${FRONTEND_IMAGE}:.*|image: ${FRONTEND_IMAGE}:main-${GITHUB_SHA::7}|" k8s/codebase-wiki/frontend/deployment.yaml
          
          # Update backend image tag
          sed -i "s|image: ${BACKEND_IMAGE}:.*|image: ${BACKEND_IMAGE}:main-${GITHUB_SHA::7}|" k8s/codebase-wiki/backend/deployment.yaml

      - name: Commit and push changes
        run: |
          cd k8s-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image tags to main-${GITHUB_SHA::7}" || echo "No changes to commit"
          git push

  notify:
    needs: [build-and-push, update-k8s-manifests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Pipeline status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ] && [ "${{ needs.update-k8s-manifests.result }}" == "success" ]; then
            echo "✅ CI/CD Pipeline completed successfully"
          else
            echo "❌ CI/CD Pipeline failed"
            exit 1
          fi
